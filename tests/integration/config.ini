[app:main]
use = egg:pypicloud

pyramid.reload_templates = false
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = en

pypi.default_read =
    everyone
pypi.default_write =
    authenticated

pypi.fallback = cache
pypi.always_show_upstream = true
pypi.cache_update =
    everyone

pypi.storage = s3
storage.endpoint_url = http://minio:9000
storage.addressing_style = path
storage.aws_access_key_id = minioadmin
storage.aws_secret_access_key = minioadmin
storage.bucket = pypi
storage.region_name = us-east-1

db.url = sqlite:////var/lib/pypicloud/db.sqlite

auth.admins =
  admin

user.admin = $6$rounds=20500$5NpJz6x.wpoFEpB0$mxWEv9SrqxnENztcExFo2WOqxjNMrp79vr3Cxa5VkdYWE9kWlAHtlVm9zXB2HCgKrjjl8C6DPlvo/bKGLneRm1

# For beaker
session.encrypt_key = testkey123456789012345678901234567890
session.validate_key = testval123456789012345678901234567890
session.secure = false
session.invalidate_corrupt = true

###
# wsgi server configuration
###

[uwsgi]
paste = config:%p
paste-logger = %p
master = true
processes = 4
reload-mercy = 15
worker-reload-mercy = 15
max-requests = 1000
enable-threads = true
http = 0.0.0.0:8080

###
# logging configuration
###

[loggers]
keys = root, botocore, pypicloud

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_pypicloud]
level = DEBUG
qualname = pypicloud
handlers =

[logger_botocore]
level = WARN
qualname = botocore
handlers =

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s %(asctime)s [%(name)s] %(message)s
