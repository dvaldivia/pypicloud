      UV_INDEX_URL: http://pypicloud:8080/simple/
    entrypoint:
      - bash
      - -c
      - |
        set -e

        echo '=== Installing test tools ==='
        pip install uv awscli --quiet

        echo ''
        echo '=== Step 1: Verify pypicloud is up ==='
        python -c "import urllib.request; print(urllib.request.urlopen('http://pypicloud:8080/health').read().decode())"

        echo ''
        echo '=== Step 2: Check MinIO bucket before ==='
        BEFORE=$$(aws --endpoint-url http://minio:9000 s3 ls s3://pypi/ --recursive 2>/dev/null | wc -l | tr -d ' ')
        echo "Objects in bucket before: $$BEFORE"

        echo ''
        echo '=== Step 3: Create a uv project and add a dependency via env var proxy ==='
        mkdir -p /tmp/test-project && cd /tmp/test-project
        echo "PIP_INDEX_URL=$$PIP_INDEX_URL"
        echo "UV_INDEX_URL=$$UV_INDEX_URL"
        uv init --no-progress
        cat pyproject.toml

        echo ''
        echo '--- Adding markupsafe via uv add (no --index-url flag) ---'
        uv add --no-cache 'markupsafe==3.0.2' -v 2>&1 | tail -30

        echo ''
        echo '=== Step 4: Verify dependency is in lockfile ==='
        grep -i markupsafe uv.lock || echo "markupsafe not found in uv.lock"

        echo ''
        echo '=== Step 5: Verify package works in project venv ==='
        uv run --no-cache python -c "import markupsafe; print('markupsafe imported successfully')"

        echo ''
        echo '=== Step 6: Check MinIO for cached package ==='
        AFTER=$$(aws --endpoint-url http://minio:9000 s3 ls s3://pypi/ --recursive 2>/dev/null | wc -l | tr -d ' ')
        echo "Objects in bucket after: $$AFTER"
        aws --endpoint-url http://minio:9000 s3 ls s3://pypi/ --recursive 2>/dev/null || true

        echo ''
        echo '=== Step 7: Check pypicloud package cache ==='
        python -c "import urllib.request, json; data=json.loads(urllib.request.urlopen('http://pypicloud:8080/api/package/').read()); print('Cached packages:', json.dumps(data, indent=2))"

        echo ''
        if [ "$$AFTER" -gt "$$BEFORE" ]; then
          echo '*** PASS: Package was cached in MinIO via uv project env var proxy! ***'
        else
