          echo '*** PASS: Package was cached in MinIO via env var proxy! ***'
        else
          echo '*** FAIL: No new objects in MinIO bucket ***'
          exit 1
        fi

  test-uv-project-env:
    image: python:3.13-slim-bookworm
    depends_on:
      pypicloud:
